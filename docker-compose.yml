version: '3.8'

services:
  next_app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    networks:
      - app_network

  redis_cache:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning 
    expose:
      - "6379" 
    volumes:
      - redis_data:/data 
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443" 
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - next_app
    networks:
      - app_network

volumes:
  redis_data:

networks:
  app_network:
    driver: bridge